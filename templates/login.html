{% extends "base.html" %}
{% block title %}Login | LeadHarvester{% endblock %}
{% block content %}
<div class="lh-auth-shell py-4 py-md-5">
    <div class="card lh-auth-card border-0">
        <div class="card-body">
            <div class="text-center mb-4">
                <div class="lh-auth-icon mx-auto">
                    <i class="bi bi-shield-lock" aria-hidden="true"></i>
                </div>
                <h1 class="h4 mb-1 lh-page-title">Welcome back</h1>
                <p class="lh-page-lead small mb-0">Sign in to manage notifiers and leads.</p>
            </div>
            <form method="post" class="vstack gap-3">
                {% csrf_token %}
                {% if form.non_field_errors %}
                    <div class="alert alert-danger small mb-0">{{ form.non_field_errors }}</div>
                {% endif %}
                <div>
                    <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-secondary"><i class="bi bi-person" aria-hidden="true"></i></span>
                        <input class="form-control border-start-0 ps-0" type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" placeholder="Your username" required>
                    </div>
                </div>
                <div>
                    <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-secondary"><i class="bi bi-key" aria-hidden="true"></i></span>
                        <input class="form-control border-start-0 ps-0" type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" placeholder="••••••••" required>
                    </div>
                </div>
                <button class="btn btn-primary btn-lg w-100 rounded-3 mt-2" type="submit">
                    <i class="bi bi-box-arrow-in-right me-1" aria-hidden="true"></i> Sign in
                </button>
            </form>
            <p class="text-center text-secondary small mt-4 mb-0">New here? <a href="{% url 'register' %}">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
