{% extends "base.html" %}
{% block title %}Login | LeadHarvester{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Login</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
                        <input class="form-control" type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                        <input class="form-control" type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Login</button>
                </form>
                <p class="text-muted mt-3 mb-0">New here? <a href="{% url 'register' %}">Create an account</a>.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
